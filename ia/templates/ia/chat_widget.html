<!-- 📄 ia/templates/ia/chat_widget.html -->
<div id="kemi-chat-widget" style="position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: 'Lato', sans-serif;">
  <!-- Toggle button -->
  <button id="kemi-chat-toggle" style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #2D6A2D, #FAF3E0); border: 2px solid #F0A500; color: #3E2009; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.18); transition: transform 0.3s, background 0.3s; outline: none;">
    🌿
  </button>

  <!-- Chat window -->
  <div id="kemi-chat-window" style="display: none; width: 350px; height: 460px; background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 16px; border: 2px solid #F0A500; box-shadow: 0 8px 32px rgba(62,32,9,0.18); flex-direction: column; overflow: hidden; position: absolute; bottom: 75px; right: 0; transition: all 0.3s ease-in-out;">
    <!-- Chat Header -->
    <div style="background: linear-gradient(135deg, #3E2009, #2D6A2D); color: #FAF3E0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #F0A500;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 22px;">🌿</span>
        <div>
          <div style="font-weight: bold; font-size: 0.95rem; color: #F0A500; letter-spacing: 0.5px;">KEMI</div>
          <div style="font-size: 0.72rem; color: #FAF3E0; opacity: 0.85;">Conseillère Nutrition</div>
        </div>
      </div>
      <button id="kemi-chat-close" style="background: none; border: none; color: #FAF3E0; font-size: 20px; cursor: pointer; outline: none; line-height: 1;">&times;</button>
    </div>

    <!-- Chat Messages -->
    <div id="kemi-chat-messages" style="flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: rgba(250, 243, 224, 0.45);">
      <div style="align-self: flex-start; background: #FFF; border-radius: 12px 12px 12px 0; padding: 10px 14px; font-size: 0.85rem; max-width: 85%; border: 1px solid rgba(62,32,9,0.06); box-shadow: 0 2px 8px rgba(0,0,0,0.03); color: #3E2009; line-height: 1.45;">
        Bonjour ! Je suis <strong>KEMI</strong>, votre conseillère nutrition chez KMER FOOD. Comment puis-je vous aider à choisir un repas sain et équilibré aujourd'hui ? 🍲
      </div>
    </div>

    <!-- Chat Input Form -->
    <form id="kemi-chat-form" style="padding: 10px 12px; background: #FFF; border-top: 1px solid rgba(62,32,9,0.06); display: flex; gap: 8px; align-items: center;">
      {% csrf_token %}
      <input type="text" id="kemi-chat-input" placeholder="Posez une question à Kemi..." style="flex: 1; border: 1.5px solid rgba(62,32,9,0.12); border-radius: 20px; padding: 8px 16px; font-size: 0.82rem; outline: none; transition: border-color 0.25s;" onfocus="this.style.borderColor='#2D6A2D';" onblur="this.style.borderColor='rgba(62,32,9,0.12)';">
      <button type="submit" style="background: #2D6A2D; color: #FFF; border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.3s, transform 0.2s; outline: none;" onmouseover="this.style.background='#224F22';" onmouseout="this.style.background='#2D6A2D';">
        ➔
      </button>
    </form>
  </div>
</div>

<script>
  (function() {
    const toggleBtn = document.getElementById('kemi-chat-toggle');
    const closeBtn = document.getElementById('kemi-chat-close');
    const chatWindow = document.getElementById('kemi-chat-window');
    const chatForm = document.getElementById('kemi-chat-form');
    const chatInput = document.getElementById('kemi-chat-input');
    const chatMessages = document.getElementById('kemi-chat-messages');

    toggleBtn.addEventListener('click', () => {
      if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
        chatWindow.style.display = 'flex';
        toggleBtn.style.transform = 'scale(0.9) rotate(90deg)';
      } else {
        chatWindow.style.display = 'none';
        toggleBtn.style.transform = 'scale(1) rotate(0deg)';
      }
    });

    closeBtn.addEventListener('click', () => {
      chatWindow.style.display = 'none';
      toggleBtn.style.transform = 'scale(1) rotate(0deg)';
    });

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageText = chatInput.value.trim();
      if (!messageText) return;

      appendMessage(messageText, 'user');
      chatInput.value = '';

      const thinkingBubble = appendMessage('Kemi réfléchit...', 'thinking');

      try {
        const csrfToken = chatForm.querySelector('[name=csrfmiddlewaretoken]').value;
        const response = await fetch('/api/chat/client/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ message: messageText })
        });
        
        const data = await response.json();
        thinkingBubble.remove();
        
        if (data.response) {
          appendMessage(data.response, 'kemi');
        } else {
          appendMessage('Désolée, je rencontre un problème de connexion.', 'kemi');
        }
      } catch (error) {
        thinkingBubble.remove();
        appendMessage('Une erreur s\'est produite. Veuillez réessayer.', 'kemi');
      }
    });

    function appendMessage(text, sender) {
      const bubble = document.createElement('div');
      bubble.style.fontSize = '0.85rem';
      bubble.style.padding = '10px 14px';
      bubble.style.lineHeight = '1.45';
      bubble.style.wordBreak = 'break-word';

      if (sender === 'user') {
        bubble.style.alignSelf = 'flex-end';
        bubble.style.background = '#2D6A2D';
        bubble.style.color = '#FFF';
        bubble.style.borderRadius = '12px 12px 0 12px';
        bubble.style.maxWidth = '85%';
        bubble.style.boxShadow = '0 2px 8px rgba(45,106,45,0.15)';
      } else if (sender === 'thinking') {
        bubble.style.alignSelf = 'flex-start';
        bubble.style.background = 'rgba(62,32,9,0.05)';
        bubble.style.color = '#888';
        bubble.style.fontStyle = 'italic';
        bubble.style.borderRadius = '12px 12px 12px 0';
        bubble.style.maxWidth = '85%';
      } else {
        bubble.style.alignSelf = 'flex-start';
        bubble.style.background = '#FFF';
        bubble.style.color = '#3E2009';
        bubble.style.borderRadius = '12px 12px 12px 0';
        bubble.style.maxWidth = '85%';
        bubble.style.border = '1px solid rgba(62,32,9,0.06)';
        bubble.style.boxShadow = '0 2px 8px rgba(0,0,0,0.03)';
      }

      bubble.innerHTML = text.replace(/\n/g, '<br>');
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return bubble;
    }
  })();
</script>
