<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un ingrédient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1> Ajouter un ingrédient à {{ recette.nom }}</h1>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Ingrédient</label>
            {{ form.ingredient }}
        </div>
        <div class="mb-3">
            <label class="form-label">Quantité</label>
            {{ form.quantite }}
        </div>

        <button type="submit" class="btn btn-success">Ajouter</button>
        <a href="{% url 'detail_recette' recette.pk %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
