<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supprimer – KMER FOOD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --vert: #2D6A2D; --rouge: #C0392B; --jaune: #F0A500;
      --ivoire: #FAF3E0; --brun: #3E2009;
      --texte: #1A1A1A; --blanc: #FFFFFF;
      --nav-bg: rgba(30,12,2,0.88);
      --card-shadow: 0 4px 20px rgba(62,32,9,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; color: var(--texte); background: var(--ivoire); }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--nav-bg); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 68px;
      border-bottom: 2px solid var(--jaune);
    }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .logo-icon { width: 42px; height: 42px; background: var(--jaune); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--jaune); }
    .nav-links { display: flex; align-items: center; gap: 0.2rem; list-style: none; }
    .nav-links a { padding: 0.45rem 1.1rem; color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.25s; }
    .nav-links a:hover { color: var(--jaune); }
    .container { max-width: 600px; margin: 120px auto 0; padding: 2.5rem 1.5rem; }
    .confirm-card {
      background: var(--blanc); border-radius: 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden; text-align: center;
    }
    .confirm-header {
      background: var(--rouge); padding: 2rem;
      color: var(--blanc);
    }
    .confirm-header .icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .confirm-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
    .confirm-body { padding: 2rem 2.5rem; }
    .confirm-body p { font-size: 1.05rem; color: #555; margin-bottom: 0.5rem; }
    .confirm-body strong { color: var(--brun); font-size: 1.15rem; }
    .warning-text {
      margin-top: 1rem; padding: 0.8rem 1.2rem;
      background: #fef3f2; border-left: 4px solid var(--rouge);
      border-radius: 6px; font-size: 0.88rem; color: var(--rouge);
      font-weight: 700;
    }
    .confirm-footer { padding: 1.5rem 2.5rem; display: flex; gap: 1rem; justify-content: center; border-top: 1px solid rgba(62,32,9,0.08); }
    .btn { display: inline-block; padding: 0.75rem 2rem; border-radius: 30px; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; text-decoration: none; transition: all 0.25s; cursor: pointer; border: none; }
    .btn-danger { background: var(--rouge); color: var(--blanc); }
    .btn-danger:hover { background: #a93226; transform: translateY(-2px); }
    .btn-secondary { background: #888; color: var(--blanc); }
    .btn-secondary:hover { background: #666; transform: translateY(-2px); }
    footer { text-align: center; padding: 2rem; background: var(--brun); color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-top: 4rem; }
    .footer-ribbon { height: 5px; display: flex; }
    .footer-ribbon span { flex: 1; }
    .footer-ribbon span:nth-child(1) { background: var(--vert); }
    .footer-ribbon span:nth-child(2) { background: var(--rouge); }
    .footer-ribbon span:nth-child(3) { background: var(--jaune); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="logo-icon">🍽️</div>
    <span class="logo-text">KMER FOOD</span>
  </a>
  <ul class="nav-links">
    <li><a href="{% url 'recettes' %}">Recettes</a></li>
    <li><a href="{% url 'inventaire' %}">Inventaire</a></li>
    <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
  </ul>
</nav>

<div class="container">
  <div class="confirm-card">
    <div class="confirm-header">
      <div class="icon">🗑️</div>
      <h1>Supprimer la recette</h1>
    </div>
    <div class="confirm-body">
      <p>Vous êtes sur le point de supprimer :</p>
      <strong>{{ recette.nom }}</strong>
      <div class="warning-text">
        ⚠️ Cette action est irréversible !
      </div>
    </div>
    <div class="confirm-footer">
      <form method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">🗑️ Oui, supprimer</button>
      </form>
      <a href="{% url 'liste_recettes' %}" class="btn btn-secondary">← Annuler</a>
    </div>
  </div>
</div>

<div class="footer-ribbon"><span></span><span></span><span></span></div>
<footer><strong>KMER FOOD</strong> · Saveurs authentiques du Cameroun</footer>

</body>
</html>
