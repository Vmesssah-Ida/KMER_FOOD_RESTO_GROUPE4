<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mouvement de stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>📊 Enregistrer un mouvement</h1>
    <h5 class="text-muted">Article : {{ article.nom }}</h5>
    <p>Stock actuel : <strong>{{ article.quantite_disponible }} {{ article.unite }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Type de mouvement</label>
            <select name="type" class="form-control" required>
                <option value="entree">Entrée (réapprovisionnement)</option>
                <option value="sortie">Sortie (consommation)</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantité</label>
            <input type="number" step="0.01" name="quantite"
                class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Motif</label>
            <input type="text" name="motif" class="form-control"
                placeholder="Ex: Livraison fournisseur, Commande N°5...">
        </div>

        <button type="submit" class="btn btn-success">Enregistrer</button>
        <a href="{% url 'detail_article' article.pk %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
