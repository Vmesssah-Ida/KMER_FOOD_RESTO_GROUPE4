{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espace Serveur — KMER FOOD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --vert:#2D6A2D; --rouge:#C0392B; --jaune:#F0A500; --ivoire:#FAF3E0;
      --brun:#3E2009; --texte:#1A1A1A; --blanc:#FFFFFF;
      --sidebar-w:260px; --nav-bg:rgba(30,12,2,0.95);
      --card-shadow:0 2px 14px rgba(62,32,9,0.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;color:var(--texte);background:var(--ivoire);display:flex;min-height:100vh;}

    .sidebar{width:var(--sidebar-w);background:var(--brun);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:10;padding:1.5rem 0;}
    .sidebar-brand{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--ivoire);text-align:center;padding-bottom:2rem;border-bottom:1px solid rgba(250,243,224,0.1);margin-bottom:1.5rem;}
    .sidebar-brand span{color:var(--jaune);}
    
    .nav-menu{list-style:none;display:flex;flex-direction:column;gap:0.25rem;}
    .nav-item a{display:flex;align-items:center;padding:0.85rem 1.5rem;color:var(--ivoire);text-decoration:none;font-weight:400;transition:all 0.2s;}
    .nav-item.active a, .nav-item a:hover{background:var(--vert);color:var(--blanc);}
    
    .logout-box{margin-top:auto;padding:0 1rem;}
    .btn-sidebar-logout{display:block;width:100%;background:var(--rouge);color:var(--blanc);text-align:center;padding:0.7rem;border-radius:4px;text-decoration:none;font-weight:700;}

    .main-content{margin-left:var(--sidebar-w);flex:1;padding:2rem 3rem;}
    .header-page{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;border-bottom:2px solid rgba(62,32,9,0.1);padding-bottom:1rem;}
    
    .card-form{background:var(--blanc);padding:2rem;border-radius:8px;box-shadow:var(--card-shadow);max-width:700px;}
    .form-group{margin-bottom:1.25rem;}
    .form-group label{display:block;margin-bottom:0.5rem;font-weight:700;color:var(--brun);}
    .form-group select, .form-group input{width:100%;padding:0.7rem;border:1px solid #ccc;border-radius:4px;}
    
    .ligne-item{display:flex;gap:1rem;align-items:center;margin-bottom:0.8rem;}
    .btn-danger{background:var(--rouge);color:var(--blanc);border:none;padding:0.7rem;border-radius:4px;cursor:pointer;}
    .total-preview{font-size:1.3rem;font-weight:700;color:var(--vert);margin:1.5rem 0;text-align:right;}
    .btn-submit{background:var(--vert);color:var(--blanc);border:none;padding:0.8rem 2rem;font-weight:700;border-radius:4px;cursor:pointer;}
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">KMER<span>FOOD</span> <br/><small style="font-size:0.75rem;opacity:0.6;">Espace Serveur</small></div>
    <ul class="nav-menu">
      <li class="nav-item active"><a href="#">Prise de commande </a></li>
      <li class="nav-item"><a href="#">Tables en salle</a></li>
    </ul>
    <div class="logout-box">
    <a href="{% url 'logout' %}" class="btn-logout">Deconnexion</a> 
    </div>
  </div>

  <div class="main-content">
    <div class="header-page">
      <h1 id="page-title">Nouvelle Commande sur Place </h1>
      <span id="page-date" style="opacity:0.6;">Service en cours...</span>
    </div>

    <div class="card-form">
      <form method="POST" action="">
        {% csrf_token %}
        <div class="form-group">
          <label>Numéro de Table</label>
          <input type="number" required placeholder="Ex: 5" min="1"/>
        </div>

        <div class="form-group">
          <label>Sélection des Plats [cite: 146]</label>
          <div id="lignes-container">
            <div class="ligne-item">
              <select name="produit[]" onchange="calculerTotal()">
                <option value="ndole" data-prix="4500">Ndolè Royal — 4 500 FCFA</option>
                <option value="poisson" data-prix="5000">Poisson Braisé — 5 000 FCFA</option>
              </select>
              <input type="number" name="quantite[]" value="1" min="1" style="width:80px;" oninput="calculerTotal()"/>
              <button type="button" class="btn-danger" onclick="this.closest('.ligne-item').remove(); calculerTotal();">X</button>
            </div>
          </div>
          <button type="button" style="margin-top:0.5rem; background:#eee; padding:0.4rem 1rem; border:none; cursor:pointer;" onclick="ajouterLigne()">+ Ajouter un plat</button>
        </div>

        <div class="total-preview" id="total-preview">Total : 4 500 FCFA [cite: 145, 147]</div>
        <button type="submit" class="btn-submit">Envoyer en cuisine </button>
      </form>
    </div>
  </div>

  <script>
    function ajouterLigne() {
      const container = document.getElementById('lignes-container');
      const div = document.createElement('div');
      div.className = 'ligne-item';
      div.innerHTML = `
        <select name="produit[]" onchange="calculerTotal()">
          <option value="ndole" data-prix="4500">Ndolè Royal — 4 500 FCFA</option>
          <option value="poisson" data-prix="5000">Poisson Braisé — 5 000 FCFA</option>
        </select>
        <input type="number" name="quantite[]" value="1" min="1" style="width:80px;" oninput="calculerTotal()"/>
        <button type="button" class="btn-danger" onclick="this.closest('.ligne-item').remove(); calculerTotal();">X</button>
      `;
      container.appendChild(div);
      calculerTotal();
    }

    function calculerTotal() {
      let total = 0;
      document.querySelectorAll('.ligne-item').forEach(ligne => {
        const select = ligne.querySelector('select');
        const price = parseInt(select.options[select.selectedIndex].dataset.prix);
        const qty = parseInt(ligne.querySelector('input').value) || 0;
        total += price * qty;
      });
      document.getElementById('total-preview').textContent = 'Total : ' + total.toLocaleString('fr-FR') + ' FCFA';
    }
  </script>
</body>
</html>
