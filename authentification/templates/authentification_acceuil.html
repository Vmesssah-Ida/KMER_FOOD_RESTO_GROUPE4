<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — KMER FOOD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --vert:   #2D6A2D;
      --rouge:  #C0392B;
      --jaune:  #F0A500;
      --ivoire: #FAF3E0;
      --brun:   #3E2009;
      --blanc:  #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--ivoire);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Fond décoratif ── */
    .page-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--brun) 0%, #7a3b10 50%, var(--vert) 100%);
      z-index: 0;
    }

    /* Ruban tricolore en bas */
    .ribbon {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      display: flex;
      z-index: 10;
    }
    .ribbon span { flex: 1; }
    .ribbon span:nth-child(1) { background: var(--vert); }
    .ribbon span:nth-child(2) { background: var(--rouge); }
    .ribbon span:nth-child(3) { background: var(--jaune); }

    /* ── Carte de connexion ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--blanc);
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── En-tête ── */
    .card-header { text-align: center; margin-bottom: 2rem; }

    .logo-circle {
      width: 64px; height: 64px;
      background: var(--jaune);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 6px 20px rgba(240,165,0,0.4);
      margin-bottom: 1rem;
    }

    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--brun);
    }

    .card-header p {
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.3rem;
    }

    /* ── Alerte erreur ── */
    .alert-error {
      background: #fdecea;
      border-left: 4px solid var(--rouge);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.84rem;
      color: var(--rouge);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Champs ── */
    .form-group { margin-bottom: 1.3rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brun);
      margin-bottom: 0.45rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border: 1.5px solid #e0d5c8;
      border-radius: 12px;
      font-size: 0.92rem;
      font-family: 'Lato', sans-serif;
      color: #1A1A1A;
      background: #faf7f3;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--jaune);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.15);
    }

    /* ── Options ── */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      margin-bottom: 1.6rem;
    }

    .form-options label {
      display: flex; align-items: center; gap: 0.4rem;
      color: #777; cursor: pointer;
    }

    .form-options a {
      color: var(--rouge);
      text-decoration: none;
      font-weight: 700;
    }

    .form-options a:hover { text-decoration: underline; }

    /* ── Bouton submit ── */
    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      background: var(--vert);
      color: var(--blanc);
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 16px rgba(45,106,45,0.3);
    }

    .btn-submit:hover {
      background: #245224;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,106,45,0.4);
    }

    /* ── Pied de carte ── */
    .card-footer {
      text-align: center;
      font-size: 0.83rem;
      color: #999;
      margin-top: 1.3rem;
    }

    .card-footer a {
      color: var(--rouge);
      font-weight: 700;
      text-decoration: none;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* ── Lien retour accueil ── */
    .back-link {
      position: fixed;
      top: 1.2rem; left: 1.5rem;
      z-index: 5;
      display: flex; align-items: center; gap: 0.5rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--jaune); }
  </style>
</head>
<body>

  <div class="page-bg"></div>
  <div class="ribbon"><span></span><span></span><span></span></div>

  <!-- Retour accueil -->
  <a href="{% url 'accueil' %}" class="back-link">← KMER FOOD</a>

  <div class="card">

    <!-- En-tête -->
    <div class="card-header">
      <div class="logo-circle">🍽️</div>
      <h1>Connexion</h1>
      <p>Accédez à votre espace KMER FOOD</p>
    </div>

    <!-- Messages d'erreur Django -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert-error">⚠️ {{ message }}</div>
      {% endfor %}
    {% endif %}

    <!-- Formulaire -->
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <div class="input-wrap">
          <span class="icon">✉️</span>
          <input type="email" name="email" id="email"
                 placeholder="vous@exemple.cm"
                 autocomplete="email" required/>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" id="password"
                 placeholder="••••••••"
                 autocomplete="current-password" required/>
        </div>
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox" name="remember"/> Se souvenir de moi
        </label>
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <p class="card-footer">
      Pas encore de compte ? <a href="#">Créer un compte</a>
    </p>

  </div>

</body>
</html>
